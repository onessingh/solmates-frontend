        /* ========== NAVBAR ========== */
        .top-nav {

            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.98);

            letter-spacing: 0.5px;

        }

        .nav-right {

            margin: 20px 0;

        @media (min-width: 768px) {

            }

        @media (min-width: 1024px) {

            background: white;
            border-radius: 12px;

        .status-badge {

        .platforms-grid {

            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.05);

        .platform-join-card i {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .platform-join-card h5 {
            font-size: 14px;
            color: #0f172a;
            font-weight: 600;
        }

        /* Admin Action Buttons */
        .admin-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .admin-action-btn {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: 0.2s;

        .admin-upload-section {

        .admin-upload-section.active {
            display: block;
            animation: slideUp 0.5s ease;

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .premium-upload-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);

            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .premium-upload-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #10b981);

        .upload-header {
            margin-bottom: 30px;
        }

        .upload-header h3 {
            font-size: 24px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .upload-form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 768px) {
            .upload-form-grid {
                grid-template-columns: 1.5fr 1fr;
            }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #94a3b8;
        }

        .premium-input,
        .premium-select {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .premium-input:focus,
        .premium-select:focus {
            background: white;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-premium-upload {
            width: 100%;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-premium-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .btn-magic-fetch {
            background: rgba(139, 92, 246, 0.1);
            color: #7c3aed;
            border: 1.5px solid rgba(139, 92, 246, 0.2);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-magic-fetch:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        /* ========== FOOTER ========== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            background: #f1f5f9;
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
        }

        .footer p {
            font-size: 12px;
            color: #64748b;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .hero-section {
                padding: 40px 15px 30px;

            .hero-content h1 {
                font-size: 26px;

                align-items: center;

            .hero-content p {
                font-size: 14px;

            .tabs-header {

            .tab-btn {

            .tabs-container {

            }

            .live-class-section {
                padding: 25px 15px;
            }

            .live-class-container h2 {
                font-size: 24px;
            }

            .live-class-container>p {
                font-size: 14px;
                margin-bottom: 15px;
            }

            .live-session-card {
                padding: 16px;
                border-radius: 10px;
            }

            .session-icon {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }

            .session-title h4 {
                font-size: 15px;
            }

            .join-btn {
                padding: 10px;
                font-size: 13px;
            }

            .premium-upload-card {
                padding: 20px 14px;
                border-radius: 16px;
            }

            .upload-header {
                margin-bottom: 20px;
            }

            .upload-header h3 {
                font-size: 19px;
            }

            .upload-header p {
                font-size: 12px;
            }

            .btn-magic-fetch {
                width: 100%;
                justify-content: center;
                font-size: 12px;
            }

            .upload-header>div {
                flex-direction: column;
                align-items: stretch !important;
                width: 100%;
            }

            .platforms-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }

            .platform-join-card {
                padding: 20px 10px;
            }

            .platform-join-card:last-child:nth-child(odd) {
                grid-column: 1 / span 2;
                max-width: 90%;
                margin: 0 auto;
                width: 100%;
            }

            .platform-join-card i {
                font-size: 28px;
            }

            .footer {
                padding: 20px;
                margin-top: 20px;
            }
        }

        @media (max-width: 480px) {
            .top-nav {
                padding: 0 12px;
            }

            .nav-left {
                font-size: 15px;
            }

            .hero-content h1 {
                font-size: 22px;
            }

            .database-btn {
                padding: 5px 10px;
                font-size: 11px;
            }

            .tab-btn {
                padding: 6px 12px;
                font-size: 11px;
            }
        }

        /* Skeleton Loading Styling (v104.7) */
        .skeleton-card {
            pointer-events: none;
            background: #ffffff;
            border-color: #f1f5f9 !important;
        }
        .skeleton-anim {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite linear;
        }
        .skeleton-line {
            background: #f1f5f9;
        }
        .skeleton-button {
            height: 40px;
            border-radius: 8px;
            background: #f1f5f9;
            width: 100%;
        }
        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
    </style>
</head>

<body>

    <header class="top-nav">
        <div class="nav-left" onclick="window.location.href='/'" style="cursor: pointer;">SOLMATES</div>
        <div class="nav-right">
            <a href="/database" class="database-btn"><i class="fas fa-database"></i> Database</a>
            <div class="admin-indicator" id="adminIndicator"></div>
        </div>
    </header>

    <div class="page-content">
        <!-- HERO -->
        <section class="hero-section">
            <div class="hero-content">
                <h1><i class="fas fa-video"></i> Live MBA Classes</h1>
                <p>Access active sessions and study material for all semesters.</p>
            </div>
        </section>

        <!-- TABS -->
        <div class="tabs-header">
            <div class="tabs-container" id="semesterTabs">

                <button class="tab-btn" onclick="switchTab('2')"><span class="desktop-text">2nd Semester</span><span class="mobile-text">Sem 2</span></button>
                <button class="tab-btn" onclick="switchTab('3')"><span class="desktop-text">3rd Semester</span><span class="mobile-text">Sem 3</span></button>

            </div>
        </div>

        <!-- LIVE SESSIONS -->
        <section class="live-class-section">
            <div class="live-class-container">
                <h2><i class="fas fa-video"></i> Today's Live Sessions</h2>
                <div class="live-sessions-grid" id="liveSessionsGrid">
                    <!-- Skeleton loader cards (v104.7) -->
                    <div class="live-session-card skeleton-card">
                        <div class="session-header">
                            <div class="session-icon skeleton-anim"></div>
                            <div class="session-title">
                                <div class="skeleton-line skeleton-anim" style="width: 150px; height: 16px; margin-bottom: 6px; border-radius: 4px;"></div>
                                <div class="skeleton-line skeleton-anim" style="width: 80px; height: 12px; border-radius: 4px;"></div>
                            </div>
                        </div>
                        <div class="session-details">
                            <div class="skeleton-line skeleton-anim" style="width: 100px; height: 12px; margin-bottom: 6px; border-radius: 4px;"></div>
                            <div class="skeleton-line skeleton-anim" style="width: 120px; height: 12px; border-radius: 4px;"></div>
                        </div>
                        <div class="skeleton-button skeleton-anim"></div>
                    </div>
                    <div class="live-session-card skeleton-card">
                        <div class="session-header">
                            <div class="session-icon skeleton-anim"></div>
                            <div class="session-title">
                                <div class="skeleton-line skeleton-anim" style="width: 130px; height: 16px; margin-bottom: 6px; border-radius: 4px;"></div>
                                <div class="skeleton-line skeleton-anim" style="width: 90px; height: 12px; border-radius: 4px;"></div>
                            </div>
                        </div>
                        <div class="session-details">
                            <div class="skeleton-line skeleton-anim" style="width: 110px; height: 12px; margin-bottom: 6px; border-radius: 4px;"></div>
                            <div class="skeleton-line skeleton-anim" style="width: 100px; height: 12px; border-radius: 4px;"></div>
                        </div>
                        <div class="skeleton-button skeleton-anim"></div>
                    </div>
                    <div class="live-session-card skeleton-card">
                        <div class="session-header">
                            <div class="session-icon skeleton-anim"></div>
                            <div class="session-title">
                                <div class="skeleton-line skeleton-anim" style="width: 160px; height: 16px; margin-bottom: 6px; border-radius: 4px;"></div>
                                <div class="skeleton-line skeleton-anim" style="width: 70px; height: 12px; border-radius: 4px;"></div>
                            </div>
                        </div>
                        <div class="session-details">
                            <div class="skeleton-line skeleton-anim" style="width: 90px; height: 12px; margin-bottom: 6px; border-radius: 4px;"></div>
                            <div class="skeleton-line skeleton-anim" style="width: 130px; height: 12px; border-radius: 4px;"></div>
                        </div>
                        <div class="skeleton-button skeleton-anim"></div>
                    </div>
                </div>

                <!-- Quick Platform Join -->
                <div class="platforms-grid">
                    <div class="platform-join-card" onclick="joinPlatform('google-meet')">
                        <i class="fab fa-google" style="color: #4285F4;"></i>
                        <h5>Google Meet</h5>
                    </div>
                    <div class="platform-join-card" onclick="joinPlatform('zoom')">
                        <i class="fas fa-video" style="color: #2D8CFF;"></i>
                        <h5>Zoom Meeting</h5>
                    </div>
                    <div class="platform-join-card" onclick="joinPlatform('microsoft-teams')">
                        <i class="fab fa-microsoft" style="color: #6264A7;"></i>
                        <h5>MS Teams</h5>
                    </div>
                </div>
            </div>
        </section>

        <!-- ADMIN PANEL -->
        <section id="adminUploadSection" class="admin-upload-section">
            <div class="premium-upload-card">
                <div class="upload-header">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                        <div>
                            <h3><i class="fas fa-cloud-upload-alt"></i> Admin Manager</h3>
                            <p>Push new classes globally</p>
                        </div>
                        <button class="btn-magic-fetch" onclick="fetchFromNotifications()"><i class="fas fa-magic"></i>
                            Fetch from Notice</button>
                    </div>
                </div>

                <form id="linkUploadForm" onsubmit="uploadLink(event)">
                    <div class="upload-form-grid">
                        <div class="form-column">
                            <div class="input-group">
                                <label class="input-label">Class Title</label>
                                <div class="input-wrapper"><i class="fas fa-heading"></i><input type="text"
                                        id="linkTitle" class="premium-input" placeholder="Title..." required></div>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Meeting URL</label>
                                <div class="input-wrapper"><i class="fas fa-link"></i><input type="text" id="linkUrl"
                                        class="premium-input" placeholder="https://..." required></div>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div class="input-group"><label class="input-label">Date</label><input type="date"
                                        id="linkDate" class="premium-input" style="padding-left:15px;" required></div>
                                <div class="input-group"><label class="input-label">Time</label><input type="time"
                                        id="linkTime" class="premium-input" style="padding-left:15px;" required></div>
                            </div>
                        </div>
                        <div class="form-column">
                            <div class="input-group">
                                <label class="input-label">Target Semester</label>
                                <select id="linkSemester" class="premium-select" multiple required
                                    style="height: 140px; padding-left: 15px;">
                                    <option value="all">Everywhere (All Semesters)</option>
                                    <option value="1">Semester 1</option>
                                    <option value="2">Semester 2</option>
                                    <option value="3">Semester 3</option>
                                    <option value="4">Semester 4</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label class="input-label">Platform</label>
                                <select id="linkPlatform" class="premium-select" style="padding-left: 15px;" required>
                                    <option value="google-meet">Google Meet</option>
                                    <option value="zoom">Zoom</option>
                                    <option value="microsoft-teams">Microsoft Teams</option>
                                    <option value="other">Other Link</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-premium-upload"><i class="fas fa-plus-circle"></i> Push
                                Globally</button>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>2026 SOLMATES • A STUDENT COMMUNITY</p>
    </footer>

    <script>
        const appData = { liveSessions: [] };
        let currentActiveTab = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            detectAdminLogin();
            initInputs();
            loadDataFromAPI();
            setupRealtime();
        });

        async function detectAdminLogin() {
            if (!!(window.solmatesAPI && window.solmatesAPI.isAdminLoggedIn())) {
                try {
                    const check = await solmatesAPI.verifyAdminToken();
                    if (check && (check.valid || check.networkError)) {
                        document.getElementById('adminIndicator').style.display = 'block';
                        document.getElementById('adminUploadSection').classList.add('active');
                    } else {
                        solmatesAPI.clearAdminSession();
                        showNotification('Session Expired. Please login on Homepage.', 'error');
                    }
                } catch (e) { console.warn('Auth check skipped:', e); }
            }
        }

        function initInputs() {
            const now = new Date();
            document.getElementById('linkDate').value = now.toISOString().split('T')[0];
            document.getElementById('linkTime').value = now.toTimeString().slice(0, 5);
        }

        function switchTab(sem) {
            currentActiveTab = sem;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick') === `switchTab('${sem}')`);
            });
            updateLiveSessionsDisplay(sem);
        }

        function updateLiveSessionsDisplay(filter = 'all') {
            const grid = document.getElementById('liveSessionsGrid');
            const isAdmin = !!(window.solmatesAPI && window.solmatesAPI.isAdminLoggedIn());

            let sessions = appData.liveSessions;
            if (filter !== 'all') {
                sessions = appData.liveSessions.filter(s => s.semesters.includes(filter) || s.semesters.includes('all'));
            }

            if (sessions.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; padding: 60px; color: #64748b;">No live classes for today.</div>`;
                return;
            }

            grid.innerHTML = sessions.map(s => {
                const isPending = !s.url || s.url === '#' || s.url === '#pending';
                return `
                <div class="live-session-card" onclick="${!isPending ? `joinSession('${s.url.replace(/'/g, "\\'").replace(/"/g, '\\"')}')` : ''}">
                    <div id="status-${s.id}"></div>
                    <div class="session-header">
                        <div class="session-icon"><i class="${getPlatformIcon(s.platform)}"></i></div>
                        <div class="session-title">
                            <h4>${escapeHtml(s.displayTitle)}</h4>
                            <span class="semester-badge">${s.semesters.includes('all') ? 'All Semesters' : 'Sem ' + s.semesters.join(', ')}</span>
                        </div>
                    </div>
                    <div class="session-details">
                        <div class="info-row"><i class="far fa-calendar-alt"></i><span>${s.displayDate}</span></div>
                        <div class="info-row"><i class="far fa-clock"></i><span>${s.displayTime}</span></div>
                    </div>

                    <button class="join-btn ${isPending ? 'pending' : ''}" onclick="joinSession('${s.url}', event)">
                        <i class="fas fa-video"></i> ${isPending ? 'Coming Soon' : 'Join Now'}
                    </button>

                    ${isAdmin ? `
                        <div class="admin-actions">
                            <button class="admin-action-btn btn-reorder" onclick="reorder('${s.id}', 'up', event)"><i class="fas fa-chevron-up"></i></button>
                            <button class="admin-action-btn btn-reorder" onclick="reorder('${s.id}', 'down', event)"><i class="fas fa-chevron-down"></i></button>
                            <button class="admin-action-btn btn-delete" onclick="deleteSession('${s.id}', event)"><i class="fas fa-trash"></i> Delete</button>
                        </div>` : ''}
                </div>`;
            }).join('');
            updateCountdowns();
        }

        async function loadDataFromAPI(skipCache = false) {
            // SWR: Load from cache first if not skipping explicitly
            if (skipCache === false) {
                try {
                    const cached = localStorage.getItem('solcache_live_classes');
                    if (cached) {
                        const parsed = JSON.parse(cached);
                        if (parsed && Array.isArray(parsed)) {
                            appData.liveSessions = parsed;
                            updateLiveSessionsDisplay(currentActiveTab);
                        }
                    }
                } catch (e) {
                    console.warn('Failed to load live classes cache:', e);
                }
            }

            try {
                const results = await Promise.all(['1', '2', '3', '4', '0'].map(sem => solmatesAPI.getSOLContent('live-classes', sem)));
                const sessionMap = new Map(); // Key: displayTitle + displayDate
                const todayStr = new Date().toLocaleDateString('en-CA');

                results.forEach((res, i) => {
                    const sourceSem = i < 4 ? String(i + 1) : "all";
                    if (res.success && res.data) {
                        res.data.forEach(item => {
                            const sessionDate = item.scheduledAt || item.date || item.created_at;
                            const sessionDay = String(sessionDate).split('T')[0].split(' ')[0];

                            // Only show Today's classes
                            if (sessionDay !== todayStr) return;

                            const meta = cleanSubjectTitle(item.title, sourceSem === 'all' ? '0' : sourceSem, sessionDate);
                            
                            // Precise Expiry Check
                            if (Date.now() > meta.expiryTime) return;

                            // Create a unique key for grouping (Title + Date)
                            const groupKey = `${meta.subject}_${meta.date || sessionDay}`;
                            
                            // Standardize Time to 24h Range
                            let finalTime = meta.time;
                            let hasRange = meta.hasRange;

                            if (!hasRange) {
                                // Fallback: Create 2h range in 24h format
                                const start = new Date(sessionDate);
                                const end = new Date(start.getTime() + 2 * 60 * 60 * 1000);
                                const f = (d) => d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
                                finalTime = `${f(start)} - ${f(end)}`;
                            } else {
                                // Convert captured range to 24h if it's in 12h
                                finalTime = convertTo24hRange(finalTime);
                            }

                            const sessionObj = {
                                id: item.id,
                                title: item.title,
                                displayTitle: meta.subject,
                                displayDate: meta.date || new Date(sessionDate).toLocaleDateString('en-IN'),
                                displayTime: finalTime,
                                url: item.link || item.url,
                                platform: item.description || 'other',
                                semesters: sourceSem === 'all' ? ['1', '2', '3', '4', 'all'] : [sourceSem],
                                scheduledAt: sessionDate,
                                hasRange: hasRange,
                                expiryTime: meta.expiryTime
                            };

                            // DE-DUPLICATION LOGIC:
                            // If we already have this class, only replace if the new one has a better time range
                            if (!sessionMap.has(groupKey)) {
                                sessionMap.set(groupKey, sessionObj);
                            } else {
                                const existing = sessionMap.get(groupKey);
                                if (!existing.hasRange && hasRange) {
                                    // Merge semesters and use the better entry
                                    sessionObj.semesters = [...new Set([...sessionObj.semesters, ...existing.semesters])];
                                    sessionMap.set(groupKey, sessionObj);
                                } else {
                                    // Just merge semesters into existing
                                    existing.semesters = [...new Set([...existing.semesters, ...sessionObj.semesters])];
                                }
                            }
                        });
                    }
                });

                const fresh = Array.from(sessionMap.values());
                fresh.sort((a, b) => new Date(a.scheduledAt) - new Date(b.scheduledAt));
                appData.liveSessions = fresh;
                
                // Cache the fresh data
                localStorage.setItem('solcache_live_classes', JSON.stringify(fresh));
                
                updateLiveSessionsDisplay(currentActiveTab);
            } catch (e) { console.error('Load failed:', e); }
        }

        function convertTo24hRange(timeStr) {
            if (!timeStr) return "";
            // If already looks like HH:MM - HH:MM, just clean it
            if (/^\d{1,2}:\d{2}\s*-\s*\d{1,2}:\d{2}$/.test(timeStr)) return timeStr.replace(/\s+/g, ' ');
            
            // Try to parse 12h format "07:00 PM - 09:00 PM" or "7:00pm"
            const parts = timeStr.split('-').map(p => p.trim());
            const format = (p) => {
                try {
                    const d = new Date(`2000-01-01 ${p}`);
                    if (isNaN(d.getTime())) return p;
                    return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
                } catch(e) { return p; }
            };

            if (parts.length === 2) return `${format(parts[0])} - ${format(parts[1])}`;
            if (parts.length === 1) {
                // Single time -> 2h range
                const start = format(parts[0]);
                try {
                    const d = new Date(`2000-01-01 ${parts[0]}`);
                    const endD = new Date(d.getTime() + 2 * 60 * 60 * 1000);
                    return `${start} - ${endD.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false })}`;
                } catch(e) { return start; }
            }
            return timeStr;
        }

        function cleanSubjectTitle(title, semester, refDate) {
            if (!title) return { subject: "", date: "", time: "", hasRange: false, expiryTime: Date.now() };
            let t = String(title).trim();
            const dMatch = t.match(/\[(\d{1,2}[-/]\d{1,2}[-/]\d{2,4})\]/);
            const tMatch = t.match(/\(([^)]*?)\)/); 
            const rangeMatch = t.match(/\d{1,2}:\d{2}\s*(?:AM|PM|am|pm)?\s*[-]\s*(\d{1,2}:\d{2}\s*(?:AM|PM|am|pm)?)/i);

            // 1. Initial Strip
            let clean = t.replace(/\[\d{1,2}[-/]\d{1,2}[-/]\d{2,4}\]/g, '').replace(/\(.*\)/g, '').trim();
            
            // 2. Remove Leading Branding
            clean = clean.replace(/^(?:MBA\s+)?(?:SEM(?:ESTER)?|YEAR|YR|PART|TERM)\s*(?:IV|III|II|I|[1-6])\s*[:\-]?\s*/i, '');

            // 3. CLEAN SUBJECT - UNIVERSAL WORD FILTER (v100.7)
            const seenNorm = new Set();
            const words = clean.split(/\s+/);
            const finalWords = [];
            const stopwords = new Set(['AND', 'IN', 'OF', 'FOR', 'WITH', 'THE', 'BY', 'TO']);
            
            for (let word of words) {
                const norm = word.toUpperCase().replace(/[^A-Z]/g, '');
                const isCamel = /[a-z]/.test(word); // Has lowercase
                
                if (norm.length >= 2) {
                    // Only skip if seen before AND (current is not camelCase OR previous was also camelCase)
                    // This protects "Business Marketing" from being cut by "MARKETING:"
                    if (seenNorm.has(norm) && !isCamel) continue; 
                    seenNorm.add(norm);
                }
                finalWords.push(word);
            }
            
            // Trailing Trash Cleaner
            while (finalWords.length > 0) {
                const last = finalWords[finalWords.length - 1].toUpperCase().replace(/[^A-Z]/g, '');
                if (stopwords.has(last) || last.length < 2) {
                    finalWords.pop();
                } else {
                    break;
                }
            }

            let cleaned = finalWords.join(' ').trim();
            cleaned = cleaned.replace(/\s*[:\-]\s*$/, '').trim(); 


            // Calculate Expiry
            let expiry = new Date(refDate).getTime() + (2 * 60 * 60 * 1000); 
            if (rangeMatch && rangeMatch[1]) {
                try {
                    const endPart = rangeMatch[1].trim();
                    const endObj = new Date(new Date(refDate).toLocaleDateString('en-US') + ' ' + endPart);
                    if (!isNaN(endObj.getTime())) expiry = endObj.getTime();
                } catch (e) { }
            }

            const rawTime = tMatch ? tMatch[1] : "";

            return {
                subject: (semester && semester !== "0" && semester !== "all") ? `MBA SEM ${semester}: ${cleaned}` : cleaned,
                date: dMatch ? dMatch[1] : "",
                time: rawTime,
                hasRange: rawTime.includes('-') || !!rangeMatch,
                expiryTime: expiry
            };
        }

        async function uploadLink(e) {
            e.preventDefault();
            const title = document.getElementById('linkTitle').value;
            const url = document.getElementById('linkUrl').value;
            const dateStr = document.getElementById('linkDate').value;
            const timeStr = document.getElementById('linkTime').value;
            const sems = Array.from(document.getElementById('linkSemester').selectedOptions).map(o => o.value);
            const targetSems = sems.includes('all') ? ['1', '2', '3', '4'] : sems;
            const scheduledAt = new Date(`${dateStr}T${timeStr}`).toISOString();
            const platform = document.getElementById('linkPlatform').value;
            try {
                for (const sem of targetSems) {
                    const payload = { title, link: url, description: platform, scheduledAt, date: dateStr };
                    await solmatesAPI.addSOLItem('live-classes', sem, payload);
                    // [v104.6] Manual notification call removed. 
                    // The Backend now handles Auto-Sync to Notifications with premium formatting.
                }
                showNotification('Success!', 'success');
                await loadDataFromAPI();
            } catch (e) {
                console.error('Upload error:', e);
                showNotification('Failed: ' + (e.message || 'Unknown error'), 'error');
            }
        }

        async function deleteSession(id, e) {
            e.stopPropagation();
            if (!confirm('Delete?')) return;
            try {
                const s = appData.liveSessions.find(x => x.id === id);
                await solmatesAPI.deleteSOLItem('live-classes', s.semesters[0], id);
                await loadDataFromAPI();
            } catch (e) {
                showNotification('Delete Failed: ' + e.message, 'error');
            }
        }

        async function reorder(id, dir, e) {
            e.stopPropagation();
            try {
                const s = appData.liveSessions.find(x => x.id === id);
                await solmatesAPI.reorderSOLItem('live-classes', s.semesters[0], id, dir);
                await loadDataFromAPI();
            } catch (e) { }
        }

        function updateCountdowns() {
            appData.liveSessions.forEach(s => {
                const el = document.getElementById(`status-${s.id}`);
                if (!el) return;
                const now = new Date();
                const start = new Date(s.scheduledAt);
                const expiry = new Date(s.expiryTime);
                const diff = start - now;
                const isExpired = now > expiry;

                if (isExpired) {
                    // Hide the card instantly if it's expired
                    const card = document.getElementById(`status-${s.id}`).closest('.live-session-card');
                    if (card) {
                        card.style.opacity = '0';
                        setTimeout(() => card.style.display = 'none', 500);
                    }
                    return;
                }

                if (diff <= 0) {
                    el.innerHTML = `<div class="status-badge live"><i class="fas fa-circle"></i> LIVE NOW</div>`;
                } else {
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s_sec = Math.floor((diff % 60000) / 1000);
                    const timeStr = `${h > 0 ? h + 'h ' : ''}${m}m ${s_sec}s`;
                    el.innerHTML = `<div class="status-badge upcoming"><i class="fas fa-clock"></i> Starts in ${timeStr}</div>`;
                }
            });
        }

        function setupRealtime() {
            setInterval(loadDataFromAPI, 60000);
            setInterval(updateCountdowns, 1000); // Update timers every second
            if (typeof io === 'undefined') { const s=document.createElement('script'); s.src='https://cdn.socket.io/4.7.5/socket.io.min.js'; s.onload = () => { const socket=io(); socket.on('sol:updated', loadDataFromAPI); }; document.body.appendChild(s); } else {
                const socket = io();
                socket.on('sol:updated', loadDataFromAPI);
            }
        }

        function getPlatformIcon(p) { return { 'google-meet': 'fab fa-google', 'zoom': 'fas fa-video', 'microsoft-teams': 'fab fa-microsoft' }[p] || 'fas fa-video'; }

        function joinSession(url, e) {
            if (e) e.stopPropagation();
            if (!url || url === '#' || url === '#pending') return;

            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            
            // v100.5: Smart Fallback Logic for App-to-Web transitions
            if (isMobile && (url.includes('teams.microsoft.com') || url.includes('zoom.us'))) {
                const deepLink = url.includes('teams.microsoft.com') 
                    ? url.replace(/^https?:\/\//, 'msteams://')
                    : url.replace(/^https?:\/\//, 'zoomus://');
                
                // 1. Attempt the Deep Link (triggers app if installed)
                window.location.href = deepLink;
                
                // 2. Fallback: If still on this page after 1.5s, trigger the Web Link
                setTimeout(() => {
                    // Only fallback if the user is still looking at our app
                    if (!document.hidden) {
                        window.location.href = url; // Standard https link
                    }
                }, 1500);
            } else {
                // Regular links (Google Meet, etc.) or Desktops
                if (isMobile) {
                    window.location.href = url;
                } else {
                    window.open(url, '_blank');
                }
            }
        }

        function escapeHtml(s) { return s ? String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
        function showNotification(msg, type) {
            const div = document.createElement('div');
            div.style.cssText = `position:fixed;bottom:24px;right:24px;background:#0f172a;color:white;padding:12px 24px;border-radius:12px;z-index:9999;font-weight:600;`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        function joinPlatform(p) { 
            const s = appData.liveSessions.find(x => x.platform === p); 
            if (s) {
                joinSession(s.url); 
            } else {
                const fallbacks = { 
                    'google-meet': 'https://meet.google.com', 
                    'zoom': 'https://zoom.us/join', 
                    'microsoft-teams': 'https://teams.microsoft.com' 
                };
                joinSession(fallbacks[p]);
            }
        }
    </script>
