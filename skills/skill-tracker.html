<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google" content="notranslate">
  <link rel="stylesheet" href="/css/global-lockdown.css?v=111.9">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Progress Tracker — SOLMATES</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1c1f;
    }

    .top-nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 52px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .nav-logo {
      font-weight: 600;
      font-size: 1.25rem;
    }

    .back-link {
      text-decoration: none;
      color: #0071e3;
      font-weight: 500;
    }

    .page-content {
      padding: 92px 24px 48px;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    label {
      font-weight: bold;
      display: block;
      margin: 15px 0 5px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .btn-primary {
      background: #0071e3;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 20px;
    }

    .hidden {
      display: none !important;
    }

    .progress-bar-container {
      background: #eee;
      border-radius: 10px;
      height: 25px;
      width: 100%;
      margin: 20px 0;
      overflow: hidden;
    }

    .progress-fill {
      background: #0071e3;
      height: 100%;
      transition: width 0.5s ease;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .dashboard-panel {
      background: #f9f9fb;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      border-left: 5px solid #0071e3;
    }

    .quote-box {
      font-style: italic;
      color: #555;
      text-align: center;
      padding: 20px;
      background: #e8f4fd;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
  <script src="/js/sol-cache.js?v=89.0"></script>
</head>

<body>

  <header class="top-nav" style="justify-content: center;">
    <span class="nav-logo" style="cursor: default;">Skill Progress Tracker</span>
  </header>

  <div class="page-content">
    <div class="container">
      <div id="setupStep" class="card">
        <h1><i class="fas fa-tasks"></i> Skill Tracker</h1>
        <p>Log your current skill level and get an AI-generated milestone framework to reach mastery.</p>

        <label>Skill Name</label>
        <input type="text" id="skillName" placeholder="e.g. Python, Public Speaking, SEO">

        <label>Current Proficiency (1-100)</label>
        <input type="number" id="currProf" min="1" max="100" placeholder="e.g. 40">

        <button class="btn-primary" id="startBtn">Generate Tracker</button>
      </div>

      <div id="loadingStep" class="card hidden" style="text-align: center;">
        <h3>Analyzing mastery roadmap...</h3>
      </div>

      <div id="resultStep" class="card hidden">
        <h1 style="text-align: center;" id="rTitle"></h1>

        <div class="progress-bar-container">
          <div class="progress-fill" id="pBar"></div>
        </div>

        <div class="dashboard-panel">
          <h3><i class="fas fa-flag-checkered"></i> Next Milestone</h3>
          <p id="nextMilestoneTxt" style="margin-top: 10px;"></p>
        </div>

        <div class="dashboard-panel">
          <h3><i class="fas fa-star"></i> Long Term Mastery Goal</h3>
          <p id="longTermTxt" style="margin-top: 10px;"></p>
        </div>

        <div class="dashboard-panel">
          <h3><i class="fas fa-clipboard-list"></i> Daily/Weekly Habits to Build</h3>
          <ul id="habitsList" style="margin-top: 10px; padding-left: 20px;"></ul>
        </div>

        <div class="quote-box" id="quoteTxt"></div>

        <button class="btn-primary" onclick="location.reload()">Track Another Skill</button>
      </div>
    </div>
  </div>

  <script src="/config.js?v=113.8"></script>
  <script src="/js/uptime-helper.js?v=101.0"></script>
  <script src="/js/api-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('startBtn').onclick = async () => {
        const sName = document.getElementById('skillName').value;
        const sProf = document.getElementById('currProf').value;
        if (!sName || !sProf) return alert("Please fill all fields.");

        document.getElementById('setupStep').classList.add('hidden');
        document.getElementById('loadingStep').classList.remove('hidden');

        try {
          const res = await window.solmatesAPI.generateAIToolData('skill-tracker', {
            skill: sName,
            proficiency: parseInt(sProf)
          });
          if (!res.success) throw new Error();

          const { skill, currentLevel, nextMilestone, longTermGoal, habitsToBuild, motivationalQuote } = res.data;

          document.getElementById('rTitle').textContent = `${skill} Dashboard`;

          const pb = document.getElementById('pBar');
          pb.style.width = `${currentLevel}%`;
          pb.textContent = `${currentLevel}%`;

          document.getElementById('nextMilestoneTxt').textContent = nextMilestone;
          document.getElementById('longTermTxt').textContent = longTermGoal;
          document.getElementById('habitsList').innerHTML = habitsToBuild.map(h => `<li>${h}</li>`).join('');
          document.getElementById('quoteTxt').textContent = `"${motivationalQuote}"`;

          document.getElementById('loadingStep').classList.add('hidden');
          document.getElementById('resultStep').classList.remove('hidden');
        } catch (e) {
          alert("Error generating API data"); location.reload();
        }
      };
    });
  </script>
</body>

</html>
