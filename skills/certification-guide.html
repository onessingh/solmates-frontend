<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google" content="notranslate">
  <link rel="stylesheet" href="/css/global-lockdown.css?v=111.9">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certification Guide — SOLMATES</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1c1f;
    }

    .top-nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 52px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .nav-logo {
      font-weight: 600;
      font-size: 1.25rem;
    }

    .back-link {
      text-decoration: none;
      color: #0071e3;
      font-weight: 500;
    }

    .page-content {
      padding: 92px 24px 48px;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    label {
      font-weight: bold;
      display: block;
      margin: 15px 0 5px;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .btn-primary {
      background: #0071e3;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 20px;
    }

    .hidden {
      display: none !important;
    }

    .cert-box {
      background: white;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 15px;
      position: relative;
    }

    .cert-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #0f2b46;
      margin-bottom: 5px;
    }

    .cert-provider {
      color: #0071e3;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .cert-meta {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      color: #666;
    }

    .cert-meta span {
      background: #f5f5f7;
      padding: 5px 10px;
      border-radius: 5px;
    }
  </style>
  <script src="/js/sol-cache.js?v=89.0"></script>
</head>

<body>

  <header class="top-nav" style="justify-content: center;">
    <span class="nav-logo" style="cursor: default;">Certification Guide</span>
  </header>

  <div class="page-content">
    <div class="container">
      <div id="setupStep" class="card">
        <h1><i class="fas fa-certificate"></i> Certification Guide</h1>
        <p>AI will analyze your field and experience to recommend the highest ROI certifications.</p>

        <label>Your Field / Industry</label>
        <input type="text" id="targetField" placeholder="e.g. Cloud Computing, Digital Marketing">

        <label>Experience Level</label>
        <select id="expLevel">
          <option value="Entry Level">Entry Level</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Senior Level">Senior Level</option>
        </select>

        <button class="btn-primary" id="startBtn">Find Certifications</button>
      </div>

      <div id="loadingStep" class="card hidden" style="text-align: center;">
        <h3>Scanning industry standards via AI...</h3>
      </div>

      <div id="resultStep" class="card hidden">
        <h1 style="text-align: center; margin-bottom: 25px;">Top Recommended Certifications</h1>

        <div id="certsContainer"></div>

        <div
          style="margin-top:20px; padding:20px; background:#f9f9fb; border-radius:15px; border-left: 5px solid #0071e3;">
          <b><i class="fas fa-info-circle"></i> General Prep Tips:</b> <br><br>
          <span id="generalTipsText"></span>
        </div>

        <button class="btn-primary" onclick="location.reload()">Search Another Field</button>
      </div>
    </div>
  </div>

  <script src="/config.js?v=113.8"></script>
  <script src="/js/uptime-helper.js?v=101.0"></script>
  <script src="/js/api-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('startBtn').onclick = async () => {
        const fld = document.getElementById('targetField').value;
        if (!fld) return alert("Please enter your field.");

        document.getElementById('setupStep').classList.add('hidden');
        document.getElementById('loadingStep').classList.remove('hidden');

        try {
          const res = await window.solmatesAPI.generateAIToolData('certification-guide', {
            field: fld,
            level: document.getElementById('expLevel').value
          });
          if (!res.success) throw new Error();

          const { certifications, generalTips } = res.data;

          document.getElementById('generalTipsText').textContent = generalTips;

          document.getElementById('certsContainer').innerHTML = certifications.map(c => `
        <div class="cert-box">
          <div class="cert-title">${c.name}</div>
          <div class="cert-provider">${c.provider}</div>
          <div class="cert-meta">
            <span><i class="fas fa-signal"></i> ${c.difficulty}</span>
            <span><i class="fas fa-tag"></i> ${c.costEstimate}</span>
          </div>
          <div><b>Why it matters:</b> ${c.whyItMatters}</div>
        </div>
      `).join('');

          document.getElementById('loadingStep').classList.add('hidden');
          document.getElementById('resultStep').classList.remove('hidden');
        } catch (e) {
          alert("Error generating API data"); location.reload();
        }
      };
    });
  </script>
</body>

</html>
