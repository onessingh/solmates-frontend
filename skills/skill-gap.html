<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google" content="notranslate">
  <link rel="stylesheet" href="/css/global-lockdown.css?v=111.9">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Gap Analysis — SOLMATES</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1c1f;
    }

    .top-nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 52px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .nav-logo {
      font-weight: 600;
      font-size: 1.25rem;
    }

    .back-link {
      text-decoration: none;
      color: #0071e3;
      font-weight: 500;
    }

    .page-content {
      padding: 92px 24px 48px;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    label {
      font-weight: bold;
      display: block;
      margin: 15px 0 5px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .btn-primary {
      background: #0071e3;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 20px;
    }

    .hidden {
      display: none !important;
    }

    .readiness {
      font-size: 3rem;
      font-weight: 700;
      color: #0071e3;
      text-align: center;
      margin: 20px 0;
    }

    .box {
      background: #f9f9fb;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 15px;
      border-left: 5px solid #0071e3;
    }

    .action-step {
      background: white;
      border: 1px solid #eee;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
  <script src="/js/sol-cache.js?v=89.0"></script>
</head>

<body>

  <header class="top-nav" style="justify-content: center;">
    <span class="nav-logo" style="cursor: default;">Skill Gap Analysis</span>
  </header>

  <div class="page-content">
    <div class="container">
      <div id="setupStep" class="card">
        <h1><i class="fas fa-chart-line"></i> Skill Gap Analysis</h1>
        <p>Enter your current skills and target role. AI will analyze what you're missing.</p>

        <label>Your Current Skills (comma separated)</label>
        <input type="text" id="curSkills" placeholder="e.g. HTML, CSS, basic JavaScript">

        <label>Target Role / Dream Job</label>
        <input type="text" id="targetRole" placeholder="e.g. Full Stack Web Developer">

        <button class="btn-primary" id="startBtn">Analyze Gap</button>
      </div>

      <div id="loadingStep" class="card hidden" style="text-align: center;">
        <h3>Analyzing Skills via AI...</h3>
      </div>

      <div id="resultStep" class="card hidden">
        <h1 style="text-align: center;">Readiness Score</h1>
        <div class="readiness" id="scoreDiv">0%</div>
        <p id="summaryText" style="text-align: center; color: #666; margin-bottom: 20px;"></p>

        <h3>Strengths</h3>
        <div class="box" id="strengthsList"></div>

        <h3>Missing Skills</h3>
        <div class="box" id="missingList" style="border-color: #f59e0b;"></div>

        <h3>Action Plan</h3>
        <div id="actionPlanDiv"></div>

        <button class="btn-primary" onclick="location.reload()">Start New Analysis</button>
      </div>
    </div>
  </div>

  <script src="/config.js?v=113.8"></script>
  <script src="/js/uptime-helper.js?v=101.0"></script>
  <script src="/js/api-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('startBtn').onclick = async () => {
        const curSkills = document.getElementById('curSkills').value;
        const targetRole = document.getElementById('targetRole').value;

        if (!curSkills || !targetRole) return alert("Please fill both fields");

        document.getElementById('setupStep').classList.add('hidden');
        document.getElementById('loadingStep').classList.remove('hidden');

        try {
          // It's a single one-shot generation, no submit required. Just generate.
          const res = await window.solmatesAPI.generateAIToolData('skill-gap', { currentSkills: curSkills, targetRole: targetRole });
          if (!res.success) throw new Error();

          const { readinessScore, missingSkills, strengths, actionPlan, summaryText } = res.data;

          document.getElementById('scoreDiv').textContent = `${readinessScore}%`;
          document.getElementById('summaryText').textContent = summaryText;

          document.getElementById('strengthsList').innerHTML = strengths.map(s => `• ${s}`).join('<br>');
          document.getElementById('missingList').innerHTML = missingSkills.map(s => `• ${s}`).join('<br>');

          document.getElementById('actionPlanDiv').innerHTML = actionPlan.map(a => `
        <div class="action-step">
          <b>Step ${a.step}: ${a.title}</b><br>
          <small>${a.description}</small>
        </div>
      `).join('');

          document.getElementById('loadingStep').classList.add('hidden');
          document.getElementById('resultStep').classList.remove('hidden');
        } catch (e) {
          alert("Error generating API data"); location.reload();
        }
      };
    });
  </script>
</body>

</html>
