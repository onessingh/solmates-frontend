<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google" content="notranslate">
  <link rel="stylesheet" href="/css/global-lockdown.css?v=111.9">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personality Assessment — SOLMATES</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* APPLE-INSPIRED DESIGN */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, 'SF Pro Display', 'Inter', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1c1f;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    .top-nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 52px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
      font-size: 14px;
    }

    .nav-logo {
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }

    .back-link {
      text-decoration: none;
      color: white;
      font-weight: 500;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0f2b46;
      padding: 6px 15px;
      border-radius: 20px;
      transition: 0.3s;
    }

    .back-link:hover {
      background: #1a3c5e;
      transform: translateY(-1px);
    }

    .page-content {
      padding: 92px 24px 48px;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(18px);
      border-radius: 36px;
      padding: 36px 32px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
      transition: all 0.25s ease;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 650;
      margin-bottom: 6px;
    }

    .apple-sub {
      color: #6e6e73;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: #0071e3;
      color: white;
    }

    .btn-primary:hover {
      background: #0077ed;
      transform: scale(1.02);
    }

    .btn-primary:disabled {
      background: #aaa;
      cursor: not-allowed;
      transform: none;
    }

    .hidden {
      display: none !important;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid #e9e9ed;
      border-top-color: #0071e3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-card {
      text-align: center;
      padding: 20px 0;
    }

    .question-box {
      background: #ffffff;
      border-radius: 28px;
      padding: 28px;
      border: 1px solid #f0f0f3;
      margin-bottom: 24px;
    }

    .question-text {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      padding: 18px 24px;
      background: #f9f9fb;
      border: 1.5px solid #e6e6ea;
      border-radius: 34px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover {
      background: #ffffff;
      border-color: #0071e3;
    }

    .option.selected {
      background: #e8f0fe;
      border-color: #0071e3;
    }

    .result-score {
      font-size: 5rem;
      font-weight: 700;
      text-align: center;
      color: #0071e3;
    }

    .error-msg {
      background: #ffe5e5;
      padding: 16px;
      color: #bf3b3b;
      border-radius: 20px;
      margin-top: 20px;
      text-align: center;
    }
  </style>
  <script src="/js/sol-cache.js?v=89.0"></script>
</head>

<body>

  <header class="top-nav" style="justify-content: center;">
    <span class="nav-logo" style="cursor: default;">Personality Assessment</span>
  </header>

  <div class="page-content">
    <div class="container">

      <!-- SETUP CARD -->
      <div id="setupStep" class="card">
        <h1><i class="fas fa-user-circle"></i> Personality Assessment</h1>
        <div class="apple-sub">Myers-Briggs Style AI Assessment · 10 introspective questions</div>
        <button class="btn btn-primary" id="startTestBtn" style="width:100%; padding:16px;">
          <i class="fas fa-play"></i> start assessment
        </button>
        <div id="setupError" class="error-msg hidden"></div>
      </div>

      <!-- LOADING CARD -->
      <div id="loadingStep" class="card hidden">
        <div class="loading-card">
          <div class="spinner"></div>
          <div id="loadingTitle" style="font-weight:600; margin-bottom:6px;">Generating your profile...</div>
          <div style="color: #6e6e73; font-size:0.9rem;">Mate AI is analyzing...</div>
        </div>
      </div>

      <!-- TEST CARD -->
      <div id="testStep" class="card hidden">
        <div style="text-align: right; margin-bottom: 12px; font-size: 0.9rem; color: #6e6e73;" id="progressLabel">
        </div>
        <div class="question-box">
          <div class="question-text" id="questionText"></div>
          <div class="options" id="optionsContainer"></div>
        </div>
        <button class="btn btn-primary" id="nextBtn" style="width:100%;">next question →</button>
        <div id="testError" class="error-msg hidden"></div>
      </div>

      <!-- RESULT CARD -->
      <div id="resultStep" class="card hidden" style="text-align:center;">
        <h1><i class="fas fa-star"></i> Your Result</h1>
        <div class="apple-sub">Based on your answers to the AI-generated scenarios</div>
        <div class="result-score" id="mbtiScore">INTP</div>
        <h2 id="mbtiTitle" style="margin-top: 10px; color: #1d1c1f; letter-spacing: -0.01em;">The Logician</h2>
        <p style="margin: 20px 0; color: #444; font-size: 1.05rem; max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.6;"
          id="mbtiDesc"></p>

        <button class="btn btn-primary" id="retakeBtn" style="margin-top:20px; width:100%;">
          <i class="fas fa-redo"></i> retake with new questions
        </button>
      </div>

    </div>
  </div>

  <script src="/config.js?v=113.8"></script>
  <script src="/js/uptime-helper.js?v=101.0"></script>
  <script src="/js/api-client.js"></script>
  <script>
    const MBTI_DETAILS = {
      'INTJ': { name: 'Architect', summary: 'Strategic thinkers with a plan for everything. They are imaginative yet decisive, ambitious yet private, and amazingly curious, but they do not squander their energy.' },
      'INTP': { name: 'Logician', summary: 'Innovative inventors with an unquenchable thirst for knowledge. They love patterns, have a keen eye for spotting discrepancies, and an almost insatiable appetite for logic.' },
      'ENTJ': { name: 'Commander', summary: 'Bold, imaginative and strong-willed leaders, always finding a way – or making one. They project charisma and confidence, and exercise authority in a way that draws crowds together.' },
      'ENTP': { name: 'Debater', summary: 'Smart and curious thinkers who cannot resist an intellectual challenge. They are the ultimate devil’s advocates, thriving on the process of shredding arguments and beliefs.' },
      'INFJ': { name: 'Advocate', summary: 'Quiet and mystical, yet very inspiring and tireless idealists. They have an inborn sense of idealism and morality, but what sets them apart is that they are not idle dreamers.' },
      'INFP': { name: 'Mediator', summary: 'Poetic, kind and altruistic people, always eager to help a good cause. They are true idealists, always looking for the hint of good in even the worst of people and events.' },
      'ENFJ': { name: 'Protagonist', summary: 'Charismatic and inspiring leaders, able to mesmerize their listeners. They are natural-born leaders, full of passion and charisma, reaching out and inspiring others to achieve.' },
      'ENFP': { name: 'Campaigner', summary: 'Enthusiastic, creative and sociable free spirits, who can always find a reason to smile. They are independent and energetic, seeking emotional connections and freedom.' },
      'ISTJ': { name: 'Logistician', summary: 'Practical and fact-minded individuals, whose reliability cannot be doubted. They are the most abundant personality type, making up around 13% of the population.' },
      'ISFJ': { name: 'Defender', summary: 'Very dedicated and warm protectors, always ready to defend their loved ones. They are unique in that they are often quiet and reserved, but have well-developed people skills.' },
      'ESTJ': { name: 'Executive', summary: 'Excellent administrators, unsurpassed at managing things – or people. They represent tradition and order, utilizing their understanding of what is right and socially acceptable.' },
      'ESFJ': { name: 'Consul', summary: 'Extraordinarily caring, social and popular people, always eager to help. They are social creatures, and thrive on staying up to date with what their friends are doing.' },
      'ISTP': { name: 'Virtuoso', summary: 'Bold and practical experimenters, masters of all kinds of tools. They love to explore with their hands and their eyes, touching and examining the world around them.' },
      'ISFP': { name: 'Adventurer', summary: 'Flexible and charming artists, always ready to explore and experience something new. They are true artists, but not necessarily in the typical sense; they use aesthetics and design.' },
      'ESTP': { name: 'Entrepreneur', summary: 'Smart, energetic and very perceptive people, who truly enjoy living on the edge. They have a blunt, earthy humor, and love being the center of attention.' },
      'ESFP': { name: 'Entertainer', summary: 'Spontaneous, energetic and enthusiastic people – life is never boring around them. They love the spotlight, and the entire world is a stage for their energy.' }
    };

    document.addEventListener('DOMContentLoaded', () => {
      let sessionId = null;
      let questions = [];
      let answers = [];
      let currentIdx = 0;

      const setupStep = document.getElementById('setupStep');
      const loadingStep = document.getElementById('loadingStep');
      const testStep = document.getElementById('testStep');
      const resultStep = document.getElementById('resultStep');

      const startTestBtn = document.getElementById('startTestBtn');
      const nextBtn = document.getElementById('nextBtn');
      const retakeBtn = document.getElementById('retakeBtn');

      function showError(step, message) {
        const el = document.getElementById(`${step}Error`);
        if (el) { el.textContent = message; el.classList.remove('hidden'); setTimeout(() => el.classList.add('hidden'), 5000); }
      }

      function renderQuestion() {
        if (currentIdx >= questions.length) { submitTest(); return; }
        const q = questions[currentIdx];

        document.getElementById('progressLabel').textContent = `Question ${currentIdx + 1} of ${questions.length}`;
        document.getElementById('questionText').textContent = q.text;

        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';

        q.options.forEach((optStr, i) => {
          const optDiv = document.createElement('div');
          optDiv.className = 'option';
          if (answers[currentIdx] === i) optDiv.classList.add('selected');
          optDiv.textContent = optStr;
          optDiv.onclick = () => {
            container.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            optDiv.classList.add('selected');
            answers[currentIdx] = i;
          };
          container.appendChild(optDiv);
        });

        nextBtn.textContent = currentIdx === questions.length - 1 ? 'Submit Assessment' : 'Next Question →';
      }

      startTestBtn.onclick = async () => {
        setupStep.classList.add('hidden');
        document.getElementById('loadingTitle').textContent = 'Generating unique MBTI scenario questions...';
        loadingStep.classList.remove('hidden');

        try {
          const res = await window.solmatesAPI.generateAIToolData('personality-test');
          if (!res.success) throw new Error(res.error);

          questions = res.data.questions;
          sessionId = res.data.sessionId;
          answers = new Array(questions.length).fill(null);
          currentIdx = 0;

          loadingStep.classList.add('hidden');
          testStep.classList.remove('hidden');
          renderQuestion();
        } catch (err) {
          console.error(err);
          loadingStep.classList.add('hidden');
          setupStep.classList.remove('hidden');
          showError('setup', 'Failed to generate questions. Please try again.');
        }
      };

      nextBtn.onclick = () => {
        if (answers[currentIdx] === null) {
          showError('test', 'Please explicitly select an option.');
          return;
        }
        currentIdx++;
        renderQuestion();
      };

      async function submitTest() {
        testStep.classList.add('hidden');
        document.getElementById('loadingTitle').textContent = 'Analyzing your personality profile...';
        loadingStep.classList.remove('hidden');

        try {
          const res = await window.solmatesAPI.submitAIToolResult(sessionId, answers);
          if (!res.success) throw new Error(res.error);

          const details = MBTI_DETAILS[res.mbtiType] || { name: 'Unique Profile', summary: 'You have a unique personality profile characterized by a balanced set of traits.' };

          const fullForms = {
            'E': 'Extraversion', 'I': 'Introversion',
            'S': 'Sensing', 'N': 'Intuition',
            'T': 'Thinking', 'F': 'Feeling',
            'J': 'Judging', 'P': 'Perceiving'
          };

          document.getElementById('mbtiScore').textContent = res.mbtiType;
          document.getElementById('mbtiTitle').textContent = `The ${details.name}`;
          document.getElementById('mbtiDesc').innerHTML = `
        <div style="margin-bottom: 24px; font-size: 1.1rem; color: #1d1c1f;">${details.summary}</div>
        
        <div style="text-align: left; background: #f9f9fb; padding: 20px; border-radius: 20px; border: 1px solid #eee;">
          <h4 style="margin-bottom: 12px; font-size: 0.9rem; text-transform: uppercase; color: #6e6e73; letter-spacing: 0.05em;">Your Trait Breakdown</h4>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85rem; color: #444;">
            <div><strong>${fullForms['E']} (E):</strong> ${res.counts.E}</div>
            <div><strong>${fullForms['I']} (I):</strong> ${res.counts.I}</div>
            <div><strong>${fullForms['S']} (S):</strong> ${res.counts.S}</div>
            <div><strong>${fullForms['N']} (N):</strong> ${res.counts.N}</div>
            <div><strong>${fullForms['T']} (T):</strong> ${res.counts.T}</div>
            <div><strong>${fullForms['F']} (F):</strong> ${res.counts.F}</div>
            <div><strong>${fullForms['J']} (J):</strong> ${res.counts.J}</div>
            <div><strong>${fullForms['P']} (P):</strong> ${res.counts.P}</div>
          </div>
        </div>
      `;

          loadingStep.classList.add('hidden');
          resultStep.classList.remove('hidden');
        } catch (err) {
          console.error(err);
          loadingStep.classList.add('hidden');
          testStep.classList.remove('hidden');
          showError('test', 'Evaluation failed.');
        }
      }

      retakeBtn.onclick = () => {
        resultStep.classList.add('hidden');
        setupStep.classList.remove('hidden');
      };
    });
  </script>
</body>

</html>
