<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google" content="notranslate">
  <link rel="stylesheet" href="/css/global-lockdown.css?v=111.9">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growth Opportunities — SOLMATES</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1c1f;
    }

    .top-nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 52px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .nav-logo {
      font-weight: 600;
      font-size: 1.25rem;
    }

    .back-link {
      text-decoration: none;
      color: #0071e3;
      font-weight: 500;
    }

    .page-content {
      padding: 92px 24px 48px;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    label {
      font-weight: bold;
      display: block;
      margin: 15px 0 5px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .btn-primary {
      background: #0071e3;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 20px;
    }

    .hidden {
      display: none !important;
    }

    .role-card {
      border: 1px solid #0071e3;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 20px;
      background: #f9f9fb;
      border-left: 6px solid #0071e3;
    }

    .r-title {
      font-size: 1.4rem;
      font-weight: bold;
      color: #0f2b46;
      margin-bottom: 5px;
    }

    .r-timeline {
      display: inline-block;
      padding: 4px 10px;
      background: #e8f4fd;
      color: #0071e3;
      font-size: 0.85rem;
      font-weight: bold;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    .disrupt-box {
      background: #fff3cd;
      padding: 20px;
      border-radius: 10px;
      border-left: 5px solid #ffc107;
      margin-bottom: 30px;
    }
  </style>
  <script src="/js/sol-cache.js?v=89.0"></script>
</head>

<body>

  <header class="top-nav" style="justify-content: center;">
    <span class="nav-logo" style="cursor: default;">Growth Opportunities</span>
  </header>

  <div class="page-content">
    <div class="container">
      <div id="setupStep" class="card">
        <h1><i class="fas fa-rocket"></i> Future Growth & Pivot Opportunities</h1>
        <p>AI will analyze technology disruption and recommend future-proof roles you can naturally pivot into.</p>

        <label>Your Current Role</label>
        <input type="text" id="curRole" placeholder="e.g. Copywriter, Graphic Designer, QA Engineer">

        <button class="btn-primary" id="startBtn">Predict Future Pivot</button>
      </div>

      <div id="loadingStep" class="card hidden" style="text-align: center;">
        <h3>Running predictive models...</h3>
      </div>

      <div id="resultStep" class="card hidden">
        <div class="disrupt-box">
          <h3 style="margin-bottom: 10px;"><i class="fas fa-bolt"></i> Industry Disruption Analysis</h3>
          <span id="disruptTxt"></span>
        </div>

        <h2 style="margin-bottom: 20px;">Top Recommended Pivot Paths for <span id="rNameText"
            style="color:#0071e3;"></span></h2>

        <div id="rolesContainer"></div>

        <button class="btn-primary" onclick="location.reload()" style="margin-top: 10px;">Analyze Another Role</button>
      </div>
    </div>
  </div>

  <script src="/config.js?v=113.8"></script>
  <script src="/js/uptime-helper.js?v=101.0"></script>
  <script src="/js/api-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('startBtn').onclick = async () => {
        const role = document.getElementById('curRole').value;
        if (!role) return alert("Please enter your current role.");

        document.getElementById('setupStep').classList.add('hidden');
        document.getElementById('loadingStep').classList.remove('hidden');

        try {
          const res = await window.solmatesAPI.generateAIToolData('growth-opportunities', {
            currentRole: role
          });
          if (!res.success) throw new Error();

          const { currentRole, futureRoles, industryDisruption } = res.data;

          document.getElementById('disruptTxt').textContent = industryDisruption;
          document.getElementById('rNameText').textContent = currentRole;

          document.getElementById('rolesContainer').innerHTML = futureRoles.map(f => `
        <div class="role-card">
          <div class="r-title">${f.title}</div>
          <div class="r-timeline"><i class="fas fa-clock"></i> Timeline: ${f.timeline}</div>
          <p style="margin-bottom: 15px;"><b>Why it's growing:</b> ${f.whyItIsGrowing}</p>
          <div>
            <b>Skills to acquire to pivot:</b>
            <ul style="padding-left: 20px; margin-top: 5px;">
              ${f.skillsNeededToPivot.map(s => `<li>${s}</li>`).join('')}
            </ul>
          </div>
        </div>
      `).join('');

          document.getElementById('loadingStep').classList.add('hidden');
          document.getElementById('resultStep').classList.remove('hidden');
        } catch (e) {
          alert("Error generating API data"); location.reload();
        }
      };
    });
  </script>
</body>

</html>
