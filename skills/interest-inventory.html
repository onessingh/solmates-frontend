<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google" content="notranslate">
  <link rel="stylesheet" href="/css/global-lockdown.css?v=111.9">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interest Inventory — SOLMATES</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1c1f;
    }

    .top-nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 52px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .nav-logo {
      font-weight: 600;
      font-size: 1.25rem;
    }

    .back-link {
      text-decoration: none;
      color: #0071e3;
      font-weight: 500;
    }

    .page-content {
      padding: 92px 24px 48px;
      min-height: 100vh;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .btn-primary {
      display: block;
      background: #0071e3;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    .question-box {
      background: #f9f9fb;
      padding: 24px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .question-text {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .option {
      padding: 16px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .option:hover {
      border-color: #0071e3;
    }

    .option.selected {
      background: #e8f0fe;
      border-color: #0071e3;
      font-weight: bold;
    }

    .result-score {
      font-size: 3.5rem;
      font-weight: 700;
      color: #0071e3;
      text-align: center;
      letter-spacing: 5px;
    }

    .code-label {
      text-align: center;
      font-size: 1.2rem;
      color: #666;
      margin-bottom: 20px;
    }

    .trait-list {
      margin-top: 20px;
    }

    .trait-item {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
  </style>
  <script src="/js/sol-cache.js?v=89.0"></script>
</head>

<body>

  <header class="top-nav" style="justify-content: center;">
    <span class="nav-logo" style="cursor: default;">Interest Inventory</span>
  </header>

  <div class="page-content">
    <div class="container">
      <div id="setupStep" class="card">
        <h1><i class="fas fa-heart"></i> Interest Inventory</h1>
        <p>Discover your Holland Code (RIASEC) to find careers that align with your true interests and passions.</p>
        <br>
        <button class="btn-primary" id="startBtn">Start Assessment</button>
      </div>

      <div id="loadingStep" class="card hidden" style="text-align: center; padding: 40px;">
        <h3 style="color: #334155; font-size: 1.3rem; font-weight: 600;"><i class="fas fa-spinner fa-spin" style="margin-right:10px; color:#0071e3;"></i> Generating AI Assessment...</h3>
      </div>

      <div id="testStep" class="card hidden">
        <div id="progress" style="margin-bottom: 10px; color: #666; font-size: 0.9rem; text-align: right;"></div>
        <div class="question-box">
          <div class="question-text" id="qText"></div>
          <div id="optContainer"></div>
        </div>
        <button class="btn-primary" id="nextBtn">Next</button>
      </div>

      <div id="resultStep" class="card hidden">
        <h1 style="text-align: center;">Your Holland Code</h1>
        <div class="result-score" id="scoreDiv"></div>
        <div class="code-label">Top 3 Interest Areas</div>

        <div class="trait-list" id="traitList"></div>

        <br>
        <button class="btn-primary" onclick="location.reload()">Retake Assessment</button>
      </div>
    </div>
  </div>

  <script src="/config.js?v=113.8"></script>
  <script src="/js/uptime-helper.js?v=101.0"></script>
  <script src="/js/api-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let sessionId, questions = [], answers = [], currentIdx = 0;

      const mappingNames = { 'R': 'Realistic (Doers)', 'I': 'Investigative (Thinkers)', 'A': 'Artistic (Creators)', 'S': 'Social (Helpers)', 'E': 'Enterprising (Persuaders)', 'C': 'Conventional (Organizers)' };

      document.getElementById('startBtn').onclick = async () => {
        document.getElementById('setupStep').classList.add('hidden');
        document.getElementById('loadingStep').classList.remove('hidden');
        try {
          const res = await window.solmatesAPI.generateAIToolData('interest-inventory');
          if (!res.success) throw new Error();
          questions = res.data.questions;
          sessionId = res.data.sessionId;
          answers = new Array(questions.length).fill(null);
          currentIdx = 0;
          document.getElementById('loadingStep').classList.add('hidden');
          document.getElementById('testStep').classList.remove('hidden');
          renderQ();
        } catch (e) {
          alert("Error generating API data"); location.reload();
        }
      };

      function renderQ() {
        if (currentIdx >= questions.length) { submitTest(); return; }
        document.getElementById('progress').textContent = `Question ${currentIdx + 1} of ${questions.length}`;
        document.getElementById('qText').textContent = questions[currentIdx].text;
        const c = document.getElementById('optContainer'); c.innerHTML = '';
        questions[currentIdx].options.forEach((opt, idx) => {
          const d = document.createElement('div'); d.className = 'option';
          if (answers[currentIdx] === idx) d.classList.add('selected');
          d.textContent = opt;
          d.onclick = () => {
            c.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            d.classList.add('selected'); answers[currentIdx] = idx;
          };
          c.appendChild(d);
        });
        document.getElementById('nextBtn').textContent = currentIdx === questions.length - 1 ? 'Submit' : 'Next';
      }

      document.getElementById('nextBtn').onclick = () => {
        if (answers[currentIdx] === null) return alert("Select an answer");
        currentIdx++; renderQ();
      };

      async function submitTest() {
        document.getElementById('testStep').classList.add('hidden');
        document.getElementById('loadingStep').classList.remove('hidden');
        try {
          const res = await window.solmatesAPI.submitAIToolResult(sessionId, answers);

          document.getElementById('scoreDiv').textContent = res.hollandCode;

          const tList = document.getElementById('traitList');
          tList.innerHTML = '';

          const sortedTraits = Object.entries(res.counts).sort((a, b) => b[1] - a[1]);
          sortedTraits.forEach(([trait, score]) => {
            tList.innerHTML += `<div class="trait-item"><span><b>${trait}</b> - ${mappingNames[trait]}</span> <span>Score: ${score}</span></div>`;
          });

          document.getElementById('loadingStep').classList.add('hidden');
          document.getElementById('resultStep').classList.remove('hidden');
        } catch (e) { alert("Submission failed"); }
      }
    });
  </script>
</body>

</html>
