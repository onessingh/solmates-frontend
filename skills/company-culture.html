<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google" content="notranslate">
  <link rel="stylesheet" href="/css/global-lockdown.css?v=111.9">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Culture Finder — SOLMATES</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1c1f;
    }

    .top-nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 52px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
    }

    .nav-logo {
      font-weight: 600;
      font-size: 1.25rem;
    }

    .back-link {
      text-decoration: none;
      color: #0071e3;
      font-weight: 500;
    }

    .page-content {
      padding: 92px 24px 48px;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    label {
      font-weight: bold;
      display: block;
      margin: 15px 0 5px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .btn-primary {
      background: #0071e3;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 20px;
    }

    .hidden {
      display: none !important;
    }

    .match-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      position: relative;
    }

    .c-name {
      font-size: 1.5rem;
      font-weight: bold;
      color: #0f2b46;
      margin-bottom: 5px;
    }

    .c-vibe {
      color: #0071e3;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .pro-con-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 15px;
    }

    .pro-col h4 {
      color: #28a745;
      margin-bottom: 5px;
    }

    .con-col h4 {
      color: #dc3545;
      margin-bottom: 5px;
    }

    .pro-con-grid ul {
      padding-left: 15px;
      font-size: 0.9rem;
    }

    .interview-q {
      background: #f9f9fb;
      padding: 20px;
      border-radius: 15px;
      border-left: 5px solid #ffc107;
      margin-top: 25px;
    }
  </style>
  <script src="/js/sol-cache.js?v=89.0"></script>
</head>

<body>

  <header class="top-nav" style="justify-content: center;">
    <span class="nav-logo" style="cursor: default;">Company Culture Finder</span>
  </header>

  <div class="page-content">
    <div class="container">
      <div id="setupStep" class="card">
        <h1><i class="fas fa-building"></i> Company Culture Matcher</h1>
        <p>Tell the AI your core work values, and it will match you with the perfect company archetype.</p>

        <label>What do you value most in a workplace?</label>
        <input type="text" id="targetValues" placeholder="e.g. Work-life balance, Fully Remote, Fast-paced Startup">

        <label>Your Industry</label>
        <input type="text" id="targetInd" placeholder="e.g. Tech, Finance, Healthcare">

        <button class="btn-primary" id="startBtn">Find My Match</button>
      </div>

      <div id="loadingStep" class="card hidden" style="text-align: center;">
        <h3>Analyzing organizational structures...</h3>
      </div>

      <div id="resultStep" class="card hidden">
        <h1 style="text-align: center; margin-bottom: 30px;">Your Top Culture Matches</h1>

        <div id="matchesContainer"></div>

        <div class="interview-q">
          <h3><i class="fas fa-question-circle"></i> Culture Questions to Ask During Your Interview</h3>
          <ul id="qList" style="margin-top: 10px; padding-left: 20px;"></ul>
        </div>

        <button class="btn-primary" onclick="location.reload()" style="margin-top: 30px;">Try New Values</button>
      </div>
    </div>
  </div>

  <script src="/config.js?v=113.8"></script>
  <script src="/js/uptime-helper.js?v=101.0"></script>
  <script src="/js/api-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('startBtn').onclick = async () => {
        const val = document.getElementById('targetValues').value;
        const ind = document.getElementById('targetInd').value;
        if (!val) return alert("Please enter your values.");

        document.getElementById('setupStep').classList.add('hidden');
        document.getElementById('loadingStep').classList.remove('hidden');

        try {
          const res = await window.solmatesAPI.generateAIToolData('company-culture', {
            values: val,
            industry: ind
          });
          if (!res.success) throw new Error();

          const { matches, interviewQuestionsToAsk } = res.data;

          document.getElementById('matchesContainer').innerHTML = matches.map(m => `
        <div class="match-card">
          <div class="c-name">${m.companyName}</div>
          <div class="c-vibe">${m.cultureVibe}</div>
          <p style="margin-bottom: 15px; color: #555;"><i>Why it matches:</i> ${m.whyItMatches}</p>
          
          <div class="pro-con-grid">
            <div class="pro-col">
              <h4>Pros</h4>
              <ul>${m.pros.map(p => `<li>${p}</li>`).join('')}</ul>
            </div>
            <div class="con-col">
              <h4>Trade-offs</h4>
              <ul>${m.cons.map(c => `<li>${c}</li>`).join('')}</ul>
            </div>
          </div>
        </div>
      `).join('');

          document.getElementById('qList').innerHTML = interviewQuestionsToAsk.map(q => `<li>${q}</li>`).join('');

          document.getElementById('loadingStep').classList.add('hidden');
          document.getElementById('resultStep').classList.remove('hidden');
        } catch (e) {
          alert("Error generating API data"); location.reload();
        }
      };
    });
  </script>
</body>

</html>
