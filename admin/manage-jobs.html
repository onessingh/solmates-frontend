<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google" content="notranslate">
  <link rel="stylesheet" href="/css/global-lockdown.css?v=111.9">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Jobs - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header h1 {
      color: #333;
      font-size: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1aa179, #20c997);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(32, 201, 151, 0.4);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-warning {
      background: #ffc107;
      color: #333;
    }

    .content-list {
      display: grid;
      gap: 16px;
    }

    .content-item {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .item-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
      background: #e9ecef;
      margin-right: 5px;
      margin-bottom: 5px;
    }

    .badge-company {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .item-description {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid #e9ecef;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 32px;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .empty-state,
    .loading {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 12px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #1aa179;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <script src="/js/sol-cache.js?v=89.0"></script>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-briefcase"></i> Manage Manual Jobs</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openAddModal()">
          <i class="fas fa-plus"></i> Post Job
        </button>
        <button class="btn btn-secondary" onclick="window.location.href='/tools/job-search'">
          <i class="fas fa-arrow-left"></i> Back to Job
        </button>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading jobs...</p>
    </div>
    <div id="content-list" class="content-list"></div>
    <div id="empty-state" class="empty-state" style="display: none;">
      <i class="fas fa-folder-open" style="font-size: 40px; color: #ccc; margin-bottom: 15px;"></i>
      <h2>No Jobs Posted</h2>
      <p>Post new jobs to appear in the Newly Added tab.</p>
    </div>
  </div>

  <!-- Job Modal (Shared for Add/Edit) -->
  <div id="jobModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle"><i class="fas fa-plus-circle"></i> Post New Job</h2>
      <p style="color: #666; font-size: 13px; margin-bottom: 20px;">Only Job Title is strictly required. Leave other
        fields blank if not available.</p>
      <form id="jobForm">
        <input type="hidden" id="jobId" name="id">

        <div class="form-row">
          <div class="form-group">
            <label>Job Title / Role *</label>
            <input type="text" name="title" required placeholder="e.g., Software Engineer">
          </div>
          <div class="form-group">
            <label>Company/Agency</label>
            <input type="text" name="company" placeholder="e.g., Google or SOLMATES">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Job Field</label>
            <input type="text" name="field" placeholder="e.g., IT & Software">
          </div>
          <div class="form-group">
            <label>Sub Field</label>
            <input type="text" name="sub_field" placeholder="e.g., Backend Developer">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Package / Salary</label>
            <input type="text" name="package_info" placeholder="e.g., 6 LPA or Not Disclosed">
          </div>
          <div class="form-group">
            <label>Shift</label>
            <input type="text" name="shift" placeholder="e.g., Day / Night">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" placeholder="e.g., Noida / Remote">
          </div>
          <div class="form-group">
            <label>Posted Date</label>
            <input type="text" name="date" placeholder="e.g., Today or 12 Oct">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Contact Number / Email</label>
            <input type="text" name="contact_number" placeholder="HR Contact details">
          </div>
          <div class="form-group">
            <label>Form / Apply Link (Direct Apply)</label>
            <input type="text" name="link" placeholder="https://forms.gle/... or WhatsApp Link">
          </div>
        </div>

        <div class="form-group">
          <label>Detail Description (Optional)</label>
          <textarea name="detail" placeholder="Requirements, Responsibilities, etc."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> Save Job</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/config.js?v=113.8"></script>
  <script src="/js/api-client.js?v=89.0"></script>
  <script>
    const API_BASE = window.PRODUCTION_API_URL || 'https://solmates-backend-w27e.onrender.com/api';
    let allJobs = [];

    async function checkAuth() {
      if (!solmatesAPI.isAdminLoggedIn()) {
        alert('Please login as admin');
        window.location.href = '/';
        return false;
      }
      return true;
    }

    async function loadJobs() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content-list').style.display = 'none';
      document.getElementById('empty-state').style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/manual-jobs`);
        const json = await res.json();
        allJobs = json.data || [];

        document.getElementById('loading').style.display = 'none';
        if (allJobs.length === 0) {
          document.getElementById('empty-state').style.display = 'block';
          return;
        }

        document.getElementById('content-list').style.display = 'grid';
        const container = document.getElementById('content-list');
        container.innerHTML = '';

        allJobs.forEach(item => {
          const div = document.createElement('div');
          div.className = 'content-item';
          div.innerHTML = `
            <div class="item-header">
              <div>
                <div class="item-title">${item.title} at ${item.company || 'SOLMATES'}</div>
                <div>
                  ${item.field ? `<span class="badge">${item.field}</span>` : ''}
                  ${item.package_info ? `<span class="badge" style="background:#28a745;color:white;">${item.package_info}</span>` : ''}
                  ${item.location ? `<span class="badge"><i class="fas fa-map-marker-alt"></i> ${item.location}</span>` : ''}
                  <span class="badge"><i class="fas fa-clock"></i> ${item.date || 'Recently'}</span>
                </div>
              </div>
            </div>
            <div class="item-description">${item.detail || 'No detailed description provided.'}</div>
            ${item.link ? `<a href="${item.link}" target="_blank" style="color:#1aa179; display:block; margin-bottom:10px;"><i class="fas fa-link"></i> Application Link: ${item.link}</a>` : ''}
            ${item.contact_number ? `<p style="font-size: 13px; color: #666; margin-bottom:10px;"><b>Contact:</b> ${item.contact_number}</p>` : ''}
            <div class="item-actions">
              <button class="btn btn-warning" onclick="openEditModal('${item.id}')"><i class="fas fa-edit"></i> Edit</button>
              <button class="btn btn-danger" onclick="deleteJob('${item.id}')"><i class="fas fa-trash"></i> Delete</button>
            </div>
          `;
          container.appendChild(div);
        });
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        alert("Failed to load jobs: " + e.message);
      }
    }

    document.getElementById('jobForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      const jobId = document.getElementById('jobId').value;
      const token = localStorage.getItem('solmates_admin_token') || localStorage.getItem('adminToken');

      const url = jobId ? `${API_BASE}/admin/manual-jobs/${jobId}` : `${API_BASE}/admin/manual-jobs`;
      const method = jobId ? 'PUT' : 'POST';

      try {
        const res = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(data)
        });
        const json = await res.json();

        if (json.success) {
          alert(jobId ? 'Job updated successfully!' : 'Job posted successfully!');
          closeModal();
          loadJobs();
        } else {
          throw new Error(json.error || 'Failed to save');
        }
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Job';
      }
    });

    async function deleteJob(id) {
      if (!confirm('Are you sure you want to delete this job post?')) return;
      const token = localStorage.getItem('solmates_admin_token') || localStorage.getItem('adminToken');

      try {
        const res = await fetch(`${API_BASE}/admin/manual-jobs/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const json = await res.json();
        if (json.success) {
          loadJobs();
        } else {
          alert(json.error);
        }
      } catch (err) {
        alert('Error deleting: ' + err.message);
      }
    }

    function openAddModal() {
      document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle"></i> Post New Job';
      document.getElementById('jobId').value = '';
      document.getElementById('jobForm').reset();
      document.getElementById('jobModal').classList.add('active');
    }

    function openEditModal(id) {
      const job = allJobs.find(j => j.id === id);
      if (!job) return;

      document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> Edit Job Post';
      document.getElementById('jobId').value = job.id;

      const form = document.getElementById('jobForm');
      form.elements['title'].value = job.title || '';
      form.elements['company'].value = job.company || '';
      form.elements['field'].value = job.field || '';
      form.elements['sub_field'].value = job.sub_field || '';
      form.elements['package_info'].value = job.package_info || '';
      form.elements['shift'].value = job.shift || '';
      form.elements['location'].value = job.location || '';
      form.elements['date'].value = job.date || '';
      form.elements['contact_number'].value = job.contact_number || '';
      form.elements['link'].value = job.link || '';
      form.elements['detail'].value = job.detail || '';

      document.getElementById('jobModal').classList.add('active');
    }

    function closeModal() { document.getElementById('jobModal').classList.remove('active'); document.getElementById('jobForm').reset(); }

    async function init() {
      if (await checkAuth()) { loadJobs(); }
    }
    init();
  </script>
</body>

</html>
