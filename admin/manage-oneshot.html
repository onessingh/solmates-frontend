<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google" content="notranslate">
  <link rel="stylesheet" href="/css/global-lockdown.css?v=111.9">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage One-Shots - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header h1 {
      color: #333;
      font-size: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-edit {
      background: linear-gradient(135deg, #28a745, #20c997);
      color: white;
    }

    .btn-edit:hover {
      background: linear-gradient(135deg, #218838, #1aa179);
    }

    .content-list {
      display: grid;
      gap: 16px;
    }

    .content-item {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .content-item:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .item-title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .item-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-semester {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .badge-subject {
      background: #e9ecef;
      color: #495057;
    }

    .item-meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .item-description {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .item-link {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .item-link:hover {
      text-decoration: underline;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid #e9ecef;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 32px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 24px;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: white;
      border-radius: 12px;
    }

    .empty-state i {
      font-size: 64px;
      color: #ccc;
      margin-bottom: 20px;
    }

    .empty-state h2 {
      color: #666;
      margin-bottom: 12px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .header-actions {
        flex-direction: column;
      }

      .btn {
        justify-content: center;
      }
    }
  </style>
  <script src="/js/sol-cache.js?v=89.0"></script>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>
        <i class="fas fa-bolt"></i>
        Manage One-Shots
      </h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openAddModal()">
          <i class="fas fa-plus"></i> Add New One-Shot
        </button>
        <button class="btn btn-secondary" onclick="window.location.href='/database'">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </button>
      </div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading One-Shots...</p>
    </div>

    <div id="content-list" class="content-list"></div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <i class="fas fa-folder-open"></i>
      <h2>No One-Shots Yet</h2>
      <p>Add your first One-Shot to get started!</p>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-plus-circle"></i> Add New One-Shot</h2>
      </div>
      <form id="addContentForm">
        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" name="title" required placeholder="e.g., Marketing Management - Unit 1">
        </div>

        <div class="form-group">
          <label for="subject">Subject *</label>
          <input type="text" id="subject" name="subject" required placeholder="e.g., Marketing Management">
        </div>

        <div class="form-group">
          <label for="semester">Semester *</label>
          <select id="semester" name="semester" required>
            <option value="">Select Semester</option>
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
            <option value="3">Semester 3</option>
            <option value="4">Semester 4</option>
          </select>
        </div>

        <div class="form-group">
          <label for="link">Content Link *</label>
          <input type="text" id="link" name="link" required placeholder="https://drive.google.com/...">
        </div>

        <div class="form-group">
          <label for="description">Description (Optional)</label>
          <textarea id="description" name="description" placeholder="Brief description of the content..."></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeAddModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Add One-Shot
          </button>
        </div>
      </form>
    </div>
  </div>


  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-edit"></i> Edit One Shot</h2>
      </div>
      <form id="editContentForm">
        <input type="hidden" id="editId" name="editId">
        <div class="form-group">
          <label for="editTitle">Title *</label>
          <input type="text" id="editTitle" name="editTitle" required placeholder="e.g., Marketing Management - Unit 1">
        </div>
        <div class="form-group">
          <label for="editSubject">Subject *</label>
          <input type="text" id="editSubject" name="editSubject" required placeholder="e.g., Marketing Management">
        </div>
        <div class="form-group">
          <label for="editSemester">Semester *</label>
          <select id="editSemester" name="editSemester" required>
            <option value="">Select Semester</option>
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
            <option value="3">Semester 3</option>
            <option value="4">Semester 4</option>
          </select>
        </div>
        <div class="form-group">
          <label for="editLink">One Shot Link *</label>
          <input type="text" id="editLink" name="editLink" required placeholder="https://drive.google.com/...">
        </div>
        <div class="form-group">
          <label for="editDescription">Description (Optional)</label>
          <textarea id="editDescription" name="editDescription"
            placeholder="Brief description of the content..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/config.js?v=113.8"></script>
  <script src="/js/uptime-helper.js?v=101.0"></script>
  <script src="/js/api-client.js?v=89.0"></script>
  <script>
    const CONTENT_TYPE = 'oneshot';

    // ========== AUTHENTICATION CHECK ==========
    async function checkAuth() {
      if (!solmatesAPI.isAdminLoggedIn()) {
        alert('Please login as admin');
        window.location.href = '/';
        return false;
      }

      try {
        const verification = await solmatesAPI.verifyAdminToken();
        if (!verification.valid) {
          // Server explicitly said token invalid - clear and redirect
          localStorage.removeItem('solmates_admin_token');
          localStorage.removeItem('solmates_admin_logged_in');
          window.location.href = '/';
          return false;
        }
      } catch (e) {
        // Network error - backend might be starting, proceed anyway
        console.warn('Token verify network error - proceeding');
      }

      return true;
    }

    // ========== LOAD CONTENT ==========
    async function loadContent() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content-list').style.display = 'none';
      document.getElementById('empty-state').style.display = 'none';
      try {
        const response = await solmatesAPI.getContent(CONTENT_TYPE);

        document.getElementById('loading').style.display = 'none';

        if (!response.data || response.data.length === 0) {
          document.getElementById('empty-state').style.display = 'block';
          document.getElementById('content-list').style.display = 'none';
          return;
        }

        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('content-list').style.display = 'grid';

        const container = document.getElementById('content-list');
        container.innerHTML = '';

        response.data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'content-item';
          div.dataset.id = item.id;
          div.dataset.title = item.title || '';
          div.dataset.subject = item.subject || '';
          div.dataset.semester = item.semester || '';
          div.dataset.url = item.url || '';
          div.dataset.description = item.description || '';
          div.innerHTML = `
            <div class="item-header">
              <div>
                <div class="item-title">${escapeHtml(item.title)}</div>
                <div class="item-badges">
                  <span class="badge badge-semester">Semester ${item.semester}</span>
                  <span class="badge badge-subject">${escapeHtml(item.subject)}</span>
                </div>
              </div>
            </div>
            ${item.description ? `<div class="item-description">${escapeHtml(item.description)}</div>` : ''}
            <a href="${escapeHtml(item.url)}" target="_blank" class="item-link">
              <i class="fas fa-external-link-alt"></i> Open Link
            </a>
            <div class="item-meta">
              <i class="fas fa-clock"></i> Added: ${new Date(item.created_at).toLocaleDateString()}
            </div>
            <div class="item-actions">
              <button class="btn btn-edit" onclick="openEditModalFromCard(this.closest('.content-item'))">
                <i class="fas fa-edit"></i> Edit
              </button>
              <button class="btn btn-danger" onclick="deleteContent('${item.id}')">
                <i class="fas fa-trash"></i> Delete
              </button>
            </div>
          `;
          container.appendChild(div);
        });

      } catch (error) {
        console.error('Error loading content:', error);
        alert('Error loading One-Shots: ' + error.message);
        document.getElementById('loading').style.display = 'none';
      }
    }

    // ========== ADD CONTENT ==========
    document.getElementById('addContentForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(e.target);
      const data = {
        title: formData.get('title'),
        subject: formData.get('subject'),
        url: formData.get('link'),  // field name in form is 'link', backend expects 'url'
        description: formData.get('description')
      };

      const semester = formData.get('semester');
      const subject = formData.get('subject');

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding...';

      try {
        const response = await solmatesAPI.addContent(CONTENT_TYPE, data, semester, subject);

        if (response.success) {
          alert('One-Shot added successfully!');
          closeAddModal();
          e.target.reset();
          loadContent();
        }
      } catch (error) {
        alert('Error adding One-Shot: ' + error.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-save"></i> Add One-Shot';
      }
    });

    // ========== DELETE CONTENT ==========
    async function deleteContent(id) {
      if (!confirm('Are you sure you want to delete this One-Shot?')) return;

      try {
        const response = await solmatesAPI.deleteContent(CONTENT_TYPE, id);

        if (response.success) {
          alert('One-Shot deleted successfully!');
          loadContent();
        }
      } catch (error) {
        alert('Error deleting One-Shot: ' + error.message);
      }
    }

    // ========== MODAL CONTROLS ==========
    function openAddModal() {
      document.getElementById('addModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('active');
      document.body.style.overflow = 'auto';
      document.getElementById('addContentForm').reset();
    }

    // ========== UTILITY ==========
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }


    // ========== EDIT MODAL ==========
    function openEditModalFromCard(card) {
      document.getElementById('editId').value = card.dataset.id;
      document.getElementById('editTitle').value = card.dataset.title;
      document.getElementById('editSubject').value = card.dataset.subject;
      document.getElementById('editSemester').value = card.dataset.semester;
      document.getElementById('editLink').value = card.dataset.url;
      document.getElementById('editDescription').value = card.dataset.description;
      document.getElementById('editModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      document.body.style.overflow = 'auto';
      document.getElementById('editContentForm').reset();
    }

    document.getElementById('editContentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const data = {
        title: document.getElementById('editTitle').value,
        subject: document.getElementById('editSubject').value,
        url: document.getElementById('editLink').value,
        description: document.getElementById('editDescription').value
      };
      const semester = document.getElementById('editSemester').value;
      const subject = document.getElementById('editSubject').value;

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

      try {
        const response = await solmatesAPI.updateContent(CONTENT_TYPE, id, data, semester, subject);
        if (response.success) {
          alert('Updated successfully!');
          closeEditModal();
          loadContent();
        }
      } catch (error) {
        alert('Error updating: ' + error.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
      }
    });

    // ========== INITIALIZE ==========
    async function init() {
      const isAuth = await checkAuth();
      if (isAuth) {
        await loadContent();
        initRealtime();
      }
    }

    // ========== REAL-TIME UPDATES (Socket.io + polling fallback) ==========
    function initRealtime() {
      if (typeof io !== 'undefined') {
        try {
          const base = window.getSocketBaseURL ? window.getSocketBaseURL() : (window.PRODUCTION_API_URL || 'http://localhost:3000/api').replace(/\/api$/, '');
          const socket = io(base, { transports: ['polling', 'websocket'], reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 1000 });
          socket.on('content:updated', async (data) => {
            if (!data.type || data.type === CONTENT_TYPE) await loadContent();
          });
          socket.on('reconnect', async () => { await loadContent(); });
        } catch (e) { console.warn('Socket.io init failed:', e); }
      }
      setInterval(async () => { await loadContent(); }, 15000);
      document.addEventListener('visibilitychange', async () => {
        if (!document.hidden) await loadContent();
      });
    }

    init();
  </script>
</body>

</html>
